<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ 今天吃什么？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    color: #333;
  }
  .container {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 30px;
    max-width: 900px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    justify-content: center;
    backdrop-filter: blur(10px);
  }
  .wheel-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .wheel-wrapper {
    position: relative;
    display: inline-block;
  }
  .wheel-wrapper canvas {
    display: block;
    border-radius: 50%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 28px solid #e74c3c;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    z-index: 10;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 12px;
    background: #e74c3c;
    border-radius: 50%;
  }
  .btn-spin {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: none;
    padding: 14px 48px;
    font-size: 22px;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 6px 20px rgba(231,76,60,0.4);
    letter-spacing: 2px;
    user-select: none;
    width: 100%;
    max-width: 320px;
  }
  .btn-spin:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(231,76,60,0.5);
  }
  .btn-spin:active:not(:disabled) { transform: translateY(0); }
  .btn-spin:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .list-section {
    flex: 1;
    min-width: 250px;
    max-width: 360px;
    display: flex;
    flex-direction: column;
  }
  .list-section h3 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #2c3e50;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .list-section h3 span { color: #7f8c8d; font-weight: normal; font-size: 14px; }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #3498db; }
  .input-row button {
    background: #3498db;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
    font-weight: 500;
  }
  .input-row button:hover { background: #2980b9; }
  .food-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    max-height: 340px;
    overflow-y: auto;
    padding: 4px 2px;
  }
  .food-list::-webkit-scrollbar { width: 6px; }
  .food-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  .food-list li {
    background: #f0f2f5;
    padding: 6px 14px 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .food-list li:hover { background: #e74c3c; color: #fff; }
  .food-list li .del {
    font-size: 16px;
    line-height: 1;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .food-list li:hover .del { opacity: 1; }
  .empty-tip {
    color: #bdc3c7;
    font-size: 14px;
    padding: 20px 0;
    text-align: center;
  }
  .share-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .share-row button {
    flex: 1;
    color: #fff;
    border: none;
    padding: 10px 10px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 500;
    white-space: nowrap;
  }
  .share-row .btn-url { background: #2ecc71; }
  .share-row .btn-url:hover { background: #27ae60; }
  .share-row .btn-text { background: #3498db; }
  .share-row .btn-text:hover { background: #2980b9; }
  .share-row .btn-clear {
    background: #95a5a6;
    flex: 0 0 44px;
    padding: 10px 0;
    font-size: 16px;
  }
  .share-row .btn-clear:hover { background: #7f8c8d; }
  .result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    animation: fadeIn 0.3s ease;
  }
  .result-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.08); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(60px) rotate(360deg); opacity: 0; }
  }
  .result-card {
    background: #fff;
    border-radius: 28px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    animation: bounceIn 0.5s ease;
    max-width: 90vw;
    position: relative;
    overflow: hidden;
  }
  .result-card .emoji-big { font-size: 60px; display: block; margin-bottom: 8px; }
  .result-card .label { font-size: 16px; color: #95a5a6; margin-bottom: 8px; }
  .result-card .food-name {
    font-size: 42px;
    font-weight: bold;
    color: #2c3e50;
    margin-bottom: 20px;
    padding: 8px 0;
    word-break: break-all;
  }
  .result-card .btn-close {
    background: #ecf0f1;
    color: #555;
    border: none;
    padding: 10px 36px;
    border-radius: 50px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .result-card .btn-close:hover { background: #dfe6e9; }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confetti-fall 0.8s ease forwards;
    opacity: 0;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(0,0,0,0.8);
    color: #fff;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 15px;
    z-index: 200;
    opacity: 0;
    transition: all 0.35s ease;
    pointer-events: none;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 640px) {
    .container { padding: 16px; gap: 16px; border-radius: 16px; }
    .list-section { max-width: 100%; min-width: unset; width: 100%; }
    .result-card { padding: 30px 24px; }
    .result-card .food-name { font-size: 30px; }
    .btn-spin { padding: 12px 32px; font-size: 18px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="wheel-section">
    <div class="wheel-wrapper">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="400" height="400"></canvas>
    </div>
    <button class="btn-spin" id="spinBtn">🎯 转一转！</button>
  </div>
  <div class="list-section">
    <h3>📋 想吃啥 <span>点击删除</span></h3>
    <div class="input-row">
      <input type="text" id="foodInput" placeholder="输入食物名称..." maxlength="20" autocomplete="off">
      <button id="addBtn">➕ 添加</button>
    </div>
    <ul class="food-list" id="foodList"></ul>
    <div class="share-row">
      <button class="btn-url" id="urlBtn">🔗 复制网址</button>
      <button class="btn-text" id="textBtn">📋 复制文字</button>
      <button class="btn-clear" id="clearBtn">🗑️</button>
    </div>
  </div>
</div>

<div class="result-overlay" id="resultOverlay">
  <div class="result-card" id="resultCard">
    <span class="emoji-big" id="resultEmoji">🎉</span>
    <div class="label">今天就吃这个吧！</div>
    <div class="food-name" id="resultName"></div>
    <button class="btn-close" id="closeResult">好的！</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';
  var STORAGE_KEY = 'food-wheel-items';
  var DEFAULT_FOODS = ['兰州拉面','沙县小吃','黄焖鸡','麻辣烫','螺蛳粉','饺子','蛋炒饭','煲仔饭','肠粉','烧烤','火锅','麻辣香锅','酸菜鱼','烧腊饭','寿司','披萨'];
  var COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e84393','#00b894','#6c5ce7','#fd79a8','#00cec9','#fdcb6e','#e17055','#0984e3','#a29bfe','#ffeaa7','#55efc4','#fab1a0','#81ecec','#ff7675','#74b9ff','#f8a5c2','#7bed9f','#70a1ff','#ffa502','#2ed573','#1e90ff','#ff6b81','#badc58'];
  var LOGICAL_SIZE = 400, PI = Math.PI, TAU = 2 * PI;
  // 在线页面地址（jsdelivr CDN 国内可访问）
  var PAGE_URL = 'https://cdn.jsdelivr.net/gh/yuanwanglaw/food-wheel@main/index.html';

  var canvas = document.getElementById('wheelCanvas');
  var ctx = canvas.getContext('2d');
  var foodList = document.getElementById('foodList');
  var foodInput = document.getElementById('foodInput');
  var addBtn = document.getElementById('addBtn');
  var spinBtn = document.getElementById('spinBtn');
  var resultOverlay = document.getElementById('resultOverlay');
  var resultName = document.getElementById('resultName');
  var resultEmoji = document.getElementById('resultEmoji');
  var closeResult = document.getElementById('closeResult');
  var urlBtn = document.getElementById('urlBtn');
  var textBtn = document.getElementById('textBtn');
  var clearBtn = document.getElementById('clearBtn');
  var toast = document.getElementById('toast');

  var items = [], currentAngle = 0, isSpinning = false;

  var FOOD_EMOJI_MAP = {
    '面':'🍜','饭':'🍚','粉':'🍝','饺':'🥟','鸡':'🍗','鱼':'🐟','牛':'🥩','猪':'🥓','羊':'🐑','虾':'🦐',
    '蟹':'🦀','锅':'🍲','烤':'🍖','烧':'🥘','烫':'🌶️','辣':'🌶️','酸':'🍋','香':'🌿','披':'🍕','萨':'🍕',
    '寿':'🍣','司':'🍣','汉':'🍔','堡':'🍔','薯':'🍟','条':'🍟','汤':'🥣','凉':'🥗','拌':'🥗','包':'🥠',
    '粥':'🥣','饼':'🥞','肠':'🌯','卷':'🌯','蛋':'🥚','豆':'🫘','菜':'🥬','肉':'🥩'
  };
  function getEmoji(name) {
    for (var key in FOOD_EMOJI_MAP) { if (FOOD_EMOJI_MAP.hasOwnProperty(key) && name.indexOf(key) !== -1) return FOOD_EMOJI_MAP[key]; }
    return '🍽️';
  }

  function loadItems() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { var parsed = JSON.parse(saved); if (Array.isArray(parsed) && parsed.length > 0) return parsed; }
    } catch (e) {}
    return DEFAULT_FOODS.slice();
  }
  function saveItems() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch (e) {} }

  function drawWheel(angle) {
    var n = items.length, cx = LOGICAL_SIZE / 2, cy = LOGICAL_SIZE / 2, radius = cx - 12;
    ctx.clearRect(0, 0, LOGICAL_SIZE, LOGICAL_SIZE);
    if (n === 0) {
      ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); ctx.arc(cx,cy,radius,0,TAU); ctx.fill();
      ctx.fillStyle = '#95a5a6'; ctx.font = '22px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('添加食物开始', cx, cy); return;
    }
    if (n === 1) {
      ctx.beginPath(); ctx.arc(cx,cy,radius,0,TAU); ctx.fillStyle = COLORS[0]; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(items[0], cx, cy); return;
    }
    var sectorAngle = TAU / n, fontSize = Math.min(18, Math.max(11, radius * 0.17));
    for (var i = 0; i < n; i++) {
      var start = angle + i * sectorAngle, end = start + sectorAngle;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,radius,start,end); ctx.closePath();
      ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
      var midAngle = start + sectorAngle / 2;
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(midAngle);
      ctx.fillStyle = '#fff'; ctx.font = 'bold '+fontSize+'px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 3;
      var text = items[i], maxWidth = radius * 0.55, displayText = text;
      if (text.length * fontSize * 1.2 > maxWidth) { displayText = text.slice(0, Math.max(2, Math.floor(maxWidth / (fontSize * 1.2)) - 1)) + '…'; }
      ctx.fillText(displayText, radius * 0.78, 0); ctx.restore();
    }
    var grad = ctx.createRadialGradient(cx-4,cy-4,0,cx,cy,radius*0.18);
    grad.addColorStop(0,'#fff'); grad.addColorStop(0.7,'#f5f5f5'); grad.addColorStop(1,'#ddd');
    ctx.beginPath(); ctx.arc(cx,cy,radius*0.15,0,TAU); ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2; ctx.stroke();
  }

  function getWinner(angle) {
    if (items.length < 2) return items.length - 1;
    var sectorAngle = TAU / items.length;
    return Math.floor(((((-PI/2 - angle) % TAU) + TAU) % TAU) / sectorAngle) % items.length;
  }

  function spin() {
    if (isSpinning || items.length === 0) return;
    if (items.length === 1) { showResult(0); return; }
    isSpinning = true; spinBtn.disabled = true; spinBtn.textContent = '🌀 旋转中...';
    var targetIndex = Math.floor(Math.random() * items.length);
    var sectorAngle = TAU / items.length;
    var targetAngle = (( (-PI/2 - (targetIndex + 0.5) * sectorAngle) % TAU) + TAU) % TAU;
    var delta = targetAngle - (currentAngle % TAU);
    if (delta < 0) delta += TAU;
    var totalRotation = delta + (5 + Math.floor(Math.random() * 4)) * TAU;
    var startAngle = currentAngle, endAngle = startAngle + totalRotation;
    var duration = 4000 + Math.random() * 1000, startTime = performance.now();
    function animate(now) {
      var progress = Math.min((now - startTime) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 5);
      currentAngle = startAngle + totalRotation * eased;
      drawWheel(currentAngle);
      if (progress < 1) { requestAnimationFrame(animate); }
      else {
        currentAngle = endAngle; drawWheel(currentAngle);
        isSpinning = false; spinBtn.disabled = false; spinBtn.textContent = '🎯 转一转！';
        showResult(getWinner(currentAngle));
      }
    }
    requestAnimationFrame(animate);
  }

  function showResult(index) {
    var name = items[index];
    resultName.textContent = name; resultEmoji.textContent = getEmoji(name);
    var card = document.getElementById('resultCard');
    var confettis = card.querySelectorAll('.confetti-piece');
    for (var ci = 0; ci < confettis.length; ci++) confettis[ci].remove();
    var confettiColors = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6','#e84393'];
    for (var i = 0; i < 16; i++) {
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = (10 + Math.random() * 80) + '%';
      piece.style.top = (10 + Math.random() * 30) + '%';
      piece.style.background = confettiColors[i % confettiColors.length];
      piece.style.width = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDelay = (Math.random() * 0.3) + 's';
      card.appendChild(piece);
    }
    resultOverlay.classList.add('show');
  }

  function renderList() {
    foodList.innerHTML = '';
    if (items.length === 0) { foodList.innerHTML = '<li class="empty-tip">还没有食物，添加一些吧 🍽️</li>'; return; }
    for (var i = 0; i < items.length; i++) {
      var name = items[i], li = document.createElement('li');
      li.innerHTML = getEmoji(name) + ' ' + escapeHtml(name) + ' <span class="del">✕</span>';
      li.title = '点击删除'; li.addEventListener('click', makeRemoveHandler(i));
      foodList.appendChild(li);
    }
  }
  function makeRemoveHandler(idx) { return function(e) { if (e.target.classList.contains('del') || e.target === e.currentTarget) removeItem(idx); }; }
  function escapeHtml(str) { var div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

  function addItem() {
    var name = foodInput.value.trim();
    if (!name) return;
    if (items.indexOf(name) !== -1) {
      foodInput.value = ''; foodInput.placeholder = '⚠️ 已经添加过了';
      setTimeout(function() { foodInput.placeholder = '输入食物名称...'; }, 1500); return;
    }
    if (items.length >= 30) {
      foodInput.placeholder = '⚠️ 最多 30 项';
      setTimeout(function() { foodInput.placeholder = '输入食物名称...'; }, 1500); return;
    }
    items.push(name); foodInput.value = ''; foodInput.focus();
    saveItems(); renderList(); drawWheel(currentAngle);
  }
  function removeItem(index) { if (isSpinning) return; items.splice(index,1); saveItems(); renderList(); drawWheel(currentAngle); }

  function showToast(msg, duration) {
    if (!toast) return;
    toast.textContent = msg; toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() { toast.classList.remove('show'); }, duration || 2000);
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); return true; } catch (e) { return false; }
    finally { document.body.removeChild(ta); }
  }
  function copyText(text, successMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { showToast(successMsg || '✅ 已复制'); })
      .catch(function() { if (!fallbackCopy(text)) showToast('⚠️ 复制失败，请手动复制'); });
    } else { if (!fallbackCopy(text)) showToast('⚠️ 复制失败，请手动复制'); else showToast(successMsg || '✅ 已复制'); }
  }

  function copyUrl() {
    if (items.length === 0) { showToast('⚠️ 列表为空，先添加食物吧'); return; }
    var encoded = encodeURIComponent(items.join('|'));
    var url = PAGE_URL + '#items=' + encoded;
    copyText(url, '✅ 网址已复制，发到微信就能打开！');
  }
  function copyTextList() {
    if (items.length === 0) { showToast('⚠️ 列表为空，先添加食物吧'); return; }
    copyText(items.join('、'), '✅ 菜单已复制，发到微信吧！');
  }

  function clearAll() {
    if (isSpinning) return;
    if (items.length === 0) return;
    if (!confirm('确定清空所有食物？此操作不可撤销。')) return;
    items = []; saveItems(); renderList(); drawWheel(currentAngle); showToast('🗑️ 已清空');
  }

  function init() {
    var dpr = window.devicePixelRatio || 1;
    var displaySize = Math.min(400, window.innerWidth - 80, 400);
    canvas.style.width = displaySize + 'px'; canvas.style.height = displaySize + 'px';
    canvas.width = 400 * dpr; canvas.height = 400 * dpr; ctx.scale(dpr, dpr);
    items = loadItems(); renderList(); drawWheel(currentAngle);
    window.addEventListener('resize', function() {
      var s = Math.min(400, window.innerWidth - 80, 400);
      canvas.style.width = s + 'px'; canvas.style.height = s + 'px';
    });
  }

  addBtn.addEventListener('click', addItem);
  spinBtn.addEventListener('click', spin);
  urlBtn.addEventListener('click', copyUrl);
  textBtn.addEventListener('click', copyTextList);
  clearBtn.addEventListener('click', clearAll);
  closeResult.addEventListener('click', function() { resultOverlay.classList.remove('show'); });
  resultOverlay.addEventListener('click', function(e) { if (e.target === resultOverlay) resultOverlay.classList.remove('show'); });
  foodInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addItem(); });
  init();
})();
